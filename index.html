<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watchtower Times</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SETTINGS SCREEN -->
    <div id="settingsScreen" class="screen">
        <h1>Watchtower Times</h1>

        <label for="meetingLength">Meeting Length:</label>
        <select id="meetingLength">
            <option value="60">60 minutes</option>
            <option value="30">30 minutes</option>
        </select>

        <label for="articleInput">Paste Article Text:</label>
        <textarea id="articleInput" placeholder="WOL.JW.Org -> Meetings -> Study Article -> Select All -> Copy -> Paste here..."></textarea>

        <button id="generateBtn" class="primary">Generate</button>
    </div>

    <!-- DISCUSSION SCREEN -->
    <div id="discussionScreen" class="screen hidden">
        <h2 id="currentParaLabel" class="itemLabel"></h2>

        <div id="targetFinish" class="bigTime"></div>

        <div class="nextInfo">Next Paragraph: <span id="nextPara"></span></div>

        <button id="completeBtn" class="primary big"></button>

        <button id="undoBtn" class="round">Undo</button>

        <div class="bottomButtons">
            <button id="restartBtn">Restart</button>
            <button id="viewTimingsBtn">View Timings</button>
            <button id="settingsBtn">Settings</button>
        </div>
    </div>

    <!-- TIMINGS MODAL -->
    <div id="timingsModal" class="modalOverlay hidden">
        <div class="modalCard">
            <h2>Calculated Timings</h2>
            <table id="timingsTable">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="timingsTableBody"></tbody>
            </table>
            <button id="closeTimingsBtn" class="primary">Close</button>
        </div>
    </div>

    <!-- SUMMARY SCREEN (for future versions) -->
    <div id="summaryScreen" class="screen hidden">
        <h2>Summary</h2>
        <div id="summaryContent"></div>
        <button id="backToSettings" class="primary">Back to Settings</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
