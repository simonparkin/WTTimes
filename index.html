<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WT Study Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SETTINGS SCREEN -->
    <div id="settingsScreen" class="screen">
        <h1>Watchtower Study Timer</h1>

        <label for="meetingLength">Meeting Length:</label>
        <select id="meetingLength">
            <option value="60">60 minutes</option>
            <option value="30">30 minutes</option>
        </select>

        <label for="articleInput">Paste Article Text:</label>
        <textarea id="articleInput" placeholder="Paste the full Watchtower article here..."></textarea>

        <button id="generateBtn" class="primary">Generate Discussion</button>
    </div>

    <!-- DISCUSSION SCREEN -->
    <div id="discussionScreen" class="screen hidden">
        <h2 id="currentParaLabel" class="itemLabel"></h2>

        <div id="targetFinish" class="bigTime"></div>

        <div class="nextInfo">Next: <span id="nextPara"></span></div>

        <button id="completeBtn" class="primary big"></button>

        <button id="undoBtn" class="round">Undo</button>

        <div class="bottomButtons">
            <button id="restartBtn">Restart</button>
            <button id="settingsBtn">Settings</button>
        </div>
    </div>

    <!-- SUMMARY SCREEN (for future versions) -->
    <div id="summaryScreen" class="screen hidden">
        <h2>Summary</h2>
        <div id="summaryContent"></div>
        <button id="backToSettings" class="primary">Back to Settings</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
